<!doctype html>
<html lang="en">

  <link rel="stylesheet" href="../styles.css">

</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<!-- Copy the header from another page in stories/ to keep navigation identical. -->

<main id="main">
<section class="tone-rose" style="border-bottom:3px solid var(--line)">
  <div class="wrap" style="padding:66px 0 48px">
    <p class="kicker">STORY FORMAT</p>
    <h1>STORY TITLE</h1>
    <p class="lead">ONE-SENTENCE INTRODUCTION</p>
    <div class="byline"><span>YYYY-MM-DD</span><span>TAG 1 · TAG 2</span></div>
  </div>
  <img class="story-hero-image" src="../assets/photos/IMAGE.webp" alt="DESCRIBE THE IMAGE">
</section>

<section class="section">
  <div class="wrap story-layout">
    <article class="prose">
      <p class="kicker">The question</p>
      <h2 class="mt-0">SECTION HEADING</h2>
      <p>STORY TEXT</p>

      <h2>What we did</h2>
      <p>STORY TEXT</p>

      <h2>What we found</h2>
      <p>STORY TEXT</p>

      <blockquote>OPTIONAL KEY MESSAGE</blockquote>

      <h2>Why it matters</h2>
      <p>STORY TEXT</p>
    </article>

    <aside class="story-aside">
      <div class="card">
        <p class="meta">Related</p>
        <h3>RELATED PAPER OR PROJECT</h3>
        <p><a href="LINK">Open related item</a></p>
      </div>
    </aside>
  </div>
</section>
</main>

</html>

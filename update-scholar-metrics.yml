name: Update Google Scholar metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh metrics
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_AUTHOR_ID: UQrZ-fgAAAAJ
        run: python tools/update_scholar_metrics.py
      - name: Commit changed metrics
        run: |
          if git diff --quiet -- data/scholar-metrics.json; then
            echo "No metrics change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scholar-metrics.json
          git commit -m "Update Google Scholar metrics"
          git push
